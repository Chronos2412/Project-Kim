name: project_kim
description: ERP y sistema de reservaciones para Experiencias 360°
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # DB
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI / Utils
  intl: ^0.19.0

  # PDF / Export
  pdf: ^3.10.8
  printing: ^5.13.1
  excel: ^4.0.3
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo_experiencias360.jpg
    - assets/logos/
    - assets/fonts/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700