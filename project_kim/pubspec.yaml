name: project_kim
description: ERP / Sistema de gestión para Experiencias 360°
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # DATABASE
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI / HELPERS
  intl: ^0.19.0

  # EXPORT EXCEL
  excel: ^4.0.6

  # EXPORT PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  # FILE PICKER (save as)
  file_selector: ^1.0.3

  # FILE PATHS
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo_experiencias360.jpg

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700